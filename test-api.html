<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .test { background: white; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { border-left: 4px solid #10b981; }
        .error { border-left: 4px solid #ef4444; }
        button { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; }
        pre { background: #f8f8f8; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔌 API Connection Test</h1>
    
    <button onclick="testAPI()">Test Random User API</button>
    
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="test">⏳ Testing API connection...</div>';
            
            try {
                const response = await fetch('https://randomuser.me/api/?results=2&nat=in');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="test success">
                        <h3>✅ API Connection: SUCCESS</h3>
                        <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                        <p><strong>Users Fetched:</strong> ${data.results.length}</p>
                        <p><strong>Sample Data:</strong></p>
                        <pre>${JSON.stringify(data.results[0], null, 2)}</pre>
                    </div>
                `;
                
                console.log('✅ API Test Passed', data);
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ API Connection: FAILED</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Possible Causes:</strong></p>
                        <ul>
                            <li>No internet connection</li>
                            <li>Firewall blocking requests</li>
                            <li>API service is down</li>
                            <li>CORS policy restriction</li>
                        </ul>
                    </div>
                `;
                
                console.error('❌ API Test Failed', error);
            }
        }
        
        // Auto-test on load
        window.onload = () => testAPI();
    </script>
</body>
</html>
